<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#3643BA">
  <title>Account Decathlon – Collegare un Account ad un B2B</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root { --blue: #3643BA; --blue-dark: #2A3499; --blue-bg: #EEF0FB; --white: #FFFFFF; --text: #0D1240; --muted: #6370A0; --radius: 16px; --radius-sm: 10px; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Barlow', sans-serif; background: var(--blue-bg); color: var(--text); min-height: 100dvh; display: flex; flex-direction: column; }
    .wrap { width: 100%; max-width: 540px; margin: 0 auto; padding: 0 16px 32px; flex: 1; display: flex; flex-direction: column; }
    .header { position: sticky; top: 0; z-index: 100; background: var(--blue); margin: 0 -16px; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; gap: 12px; box-shadow: 0 2px 12px rgba(54,67,186,0.3); }
    .brand { display: flex; align-items: center; gap: 12px; }
    .logo-wrap { width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; }
    .logo { width: 48px; height: 48px; object-fit: contain; }
    .titles h1 { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 800; color: var(--white); letter-spacing: 0.3px; line-height: 1.1; }
    .subtitle { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.65); letter-spacing: 0.8px; text-transform: uppercase; margin-top: 2px; }
    .card { background: var(--white); border-radius: var(--radius); padding: 20px; margin-top: 20px; box-shadow: 0 3px 12px rgba(54,67,186,0.10); animation: fadeUp 0.3s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    p { font-size: 15px; line-height: 1.6; color: var(--text); margin-bottom: 10px; }
    h3 { font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 800; color: var(--blue); margin: 18px 0 8px; text-transform: uppercase; letter-spacing: 0.4px; }
    h3:first-child { margin-top: 0; }
    ul { list-style: none; display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }
    ul li { font-size: 15px; line-height: 1.5; color: var(--text); padding-left: 18px; position: relative; }
    ul li::before { content: '–'; position: absolute; left: 0; color: var(--blue); font-weight: 700; }
    .note { font-size: 13px; font-weight: 600; color: var(--muted); background: var(--blue-bg); border-radius: var(--radius-sm); padding: 10px 14px; margin-top: 12px; line-height: 1.5; }
    .homeBtn { display: inline-block; margin-top: 20px; padding: 12px 28px; background: var(--white); color: var(--blue); font-family: 'Barlow', sans-serif; font-size: 14px; font-weight: 700; border-radius: var(--radius-sm); text-decoration: none; box-shadow: 0 2px 8px rgba(54,67,186,0.15); transition: background 0.1s; }
    .homeBtn:active { background: var(--blue-bg); }
    .footer-nav { text-align: center; }
  </style>
</head>
<body>
<div class="wrap">

  <header class="header">
    <div class="brand">
      <div class="logo-wrap">
        <img src="../decathlon-logo.png" alt="Decathlon" class="logo">
      </div>
      <div class="titles">
        <h1>Collegare un Account ad un B2B</h1>
        <p class="subtitle">Account Decathlon</p>
      </div>
    </div>
    <span style="width:40px;"></span>
  </header>

  <main class="card">
    <!-- CONTENUTO DA AGGIUNGERE -->
    <p class="note">Contenuto in arrivo.</p>
  </main>

  <div class="footer-nav">
    <a href="carta-decathlon.html" class="homeBtn">← Torna ad Account Decathlon</a>
  </div>

</div>
</body>
</html>
