<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#3643BA">
  <title>Second Hand – La Nostra Offerta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root { --blue: #3643BA; --blue-dark: #2A3499; --blue-bg: #EEF0FB; --white: #FFFFFF; --text: #0D1240; --muted: #6370A0; --radius: 16px; --radius-sm: 10px; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Barlow', sans-serif; background: var(--blue-bg); color: var(--text); min-height: 100dvh; display: flex; flex-direction: column; }
    .wrap { width: 100%; max-width: 540px; margin: 0 auto; padding: 0 16px 32px; flex: 1; display: flex; flex-direction: column; }
    .header { position: sticky; top: 0; z-index: 100; background: var(--blue); margin: 0 -16px; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; gap: 12px; box-shadow: 0 2px 12px rgba(54,67,186,0.3); }
    .brand { display: flex; align-items: center; gap: 12px; }
    .logo-wrap { width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; }
    .logo { width: 48px; height: 48px; object-fit: contain; }
    .titles h1 { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 800; color: var(--white); letter-spacing: 0.3px; line-height: 1.1; }
    .subtitle { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.65); letter-spacing: 0.8px; text-transform: uppercase; margin-top: 2px; }
    .card { background: var(--white); border-radius: var(--radius); padding: 20px; margin-top: 20px; box-shadow: 0 3px 12px rgba(54,67,186,0.10); animation: fadeUp 0.3s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    .lead { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 16px; line-height: 1.5; }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 4px; }
    .catBtn { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; min-height: 100px; padding: 16px 12px; background: var(--blue); color: var(--white); text-decoration: none; border-radius: var(--radius-sm); box-shadow: 0 3px 8px rgba(54,67,186,0.25); text-align: center; transition: transform 0.1s ease, background 0.1s ease; }
    .catBtn:active { transform: scale(0.96); background: var(--blue-dark); }
    .cat-emoji { font-size: 26px; line-height: 1; }
    .cat-label { font-size: 13px; font-weight: 700; line-height: 1.25; }
    .homeBtn { display: inline-block; margin-top: 24px; padding: 12px 28px; background: var(--white); color: var(--blue); font-family: 'Barlow', sans-serif; font-size: 14px; font-weight: 700; border-radius: var(--radius-sm); text-decoration: none; box-shadow: 0 2px 8px rgba(54,67,186,0.15); transition: background 0.1s; }
    .homeBtn:active { background: var(--blue-bg); }
    .footer-nav { text-align: center; }
  </style>
</head>
<body>
<div class="wrap">

  <header class="header">
    <div class="brand">
      <div class="logo-wrap">
        <img src="../decathlon-logo.png" alt="Decathlon" class="logo">
      </div>
      <div class="titles">
        <h1>La Nostra Offerta</h1>
        <p class="subtitle">Second Hand</p>
      </div>
    </div>
    <span style="width:40px;"></span>
  </header>

  <main class="card">
    <p class="lead">Seleziona una categoria per consultare l'offerta Second Hand.</p>

    <div class="grid">
      <a class="catBtn" href="https://docs.google.com/presentation/d/1iMyl2X7TsSF7bAn-dD5UsmfBUKHPNPv_4Pb64HMpk8w/present?slide=id.p" target="_blank" rel="noopener noreferrer">
        <span class="cat-emoji">🚴</span>
        <span class="cat-label">Ciclismo</span>
      </a>
      <a class="catBtn" href="https://docs.google.com/presentation/d/1yc_7oSvGJMGMUtCAYdYetcz0uRwm7754BUvvxhIYeaE/edit?slide=id.g38294a09448_0_26#slide=id.g38294a09448_0_26" target="_blank" rel="noopener noreferrer">
        <span class="cat-emoji">⛷️</span>
        <span class="cat-label">Wintersports</span>
      </a>
      <a class="catBtn" href="https://docs.google.com/presentation/d/1AEtyo6xMLfmQkzUqWFbx4Anp0AAr5BmGrcmMv3EPt4I/present?slide=id.g2bd46eaca33_0_0" target="_blank" rel="noopener noreferrer">
        <span class="cat-emoji">🏄</span>
        <span class="cat-label">Watersports</span>
      </a>
      <a class="catBtn" href="https://docs.google.com/presentation/d/1q0m_GDvYjvkk5CiiUJD3dlmmnUt2sxYYhtH7JTo_-Po/present?slide=id.g33731c5743f_0_624" target="_blank" rel="noopener noreferrer">
        <span class="cat-emoji">🥾</span>
        <span class="cat-label">Hiking / Trekking</span>
      </a>
      <a class="catBtn" href="https://docs.google.com/presentation/d/1R2IGewpr039PUeIbIsokzCVSYqZSoWT1HjvD37yOmhI/edit?slide=id.p#slide=id.p" target="_blank" rel="noopener noreferrer">
        <span class="cat-emoji">🎾</span>
        <span class="cat-label">Sport di racchetta</span>
      </a>
      <a class="catBtn" href="https://docs.google.com/presentation/d/1PIrJUMT-irvLZSDFlDipBSnzLGreyL5LtKI1S3GEZ-E/present?slide=id.p" target="_blank" rel="noopener noreferrer">
        <span class="cat-emoji">🏋️</span>
        <span class="cat-label">Fitness</span>
      </a>
      <a class="catBtn" href="https://docs.google.com/presentation/d/1cQC4pmNo7VjiS_46t7oQV2uGi_p_HWDeyEF4ALK5tx0/present?slide=id.p" target="_blank" rel="noopener noreferrer">
        <span class="cat-emoji">🏹</span>
        <span class="cat-label">Caccia</span>
      </a>
      <a class="catBtn" href="https://docs.google.com/presentation/d/1nz_jN1rfZuS5gActAbGhYsWgkCKtj02dvddNsK2TxnQ/present?slide=id.g1f2f2580df4_0_0" target="_blank" rel="noopener noreferrer">
        <span class="cat-emoji">🎣</span>
        <span class="cat-label">Pesca</span>
      </a>
      <a class="catBtn" href="https://docs.google.com/document/d/1WLDAgn2YGYkMndbIRV1bf_2Vc4MAoRQUp7DSmdJF_YI/edit?tab=t.0" target="_blank" rel="noopener noreferrer">
        <span class="cat-emoji">⛳</span>
        <span class="cat-label">Golf</span>
      </a>
      <a class="catBtn" href="https://docs.google.com/presentation/d/1ySG4q5Ve8do12N2AssfZ8sCMmiWYCtOduOIDzsKtF88/present?slide=id.p" target="_blank" rel="noopener noreferrer">
        <span class="cat-emoji">🐎</span>
        <span class="cat-label">Equitazione</span>
      </a>
      <a class="catBtn" href="https://docs.google.com/document/d/1DV4ENK15qYlAdx1UxQ-Rff-LAoJqY2aniqYV2nxJ8F8/edit?tab=t.0" target="_blank" rel="noopener noreferrer">
        <span class="cat-emoji">🛹</span>
        <span class="cat-label">Sport di Scivolamento</span>
      </a>
    </div>
  </main>

  <div class="footer-nav">
    <a href="second-hand.html" class="homeBtn">← Torna a Second Hand</a>
  </div>

</div>
</body>
</html>
