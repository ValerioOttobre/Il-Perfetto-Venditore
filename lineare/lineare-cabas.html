<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#3643BA">
  <title>Lineare – Cabas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue:      #3643BA;
      --blue-dark: #2A3499;
      --blue-bg:   #EEF0FB;
      --white:     #FFFFFF;
      --text:      #0D1240;
      --muted:     #6370A0;
      --radius:    16px;
      --radius-sm: 10px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Barlow', sans-serif;
      background: var(--blue-bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }
    .wrap {
      width: 100%;
      max-width: 540px;
      margin: 0 auto;
      padding: 0 16px 32px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--blue);
      margin: 0 -16px;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      box-shadow: 0 2px 12px rgba(54,67,186,0.3);
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .logo-wrap {
      width: 48px; height: 48px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; overflow: hidden;
    }
    .logo { width: 48px; height: 48px; object-fit: contain; }
    .titles h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px; font-weight: 800;
      color: var(--white);
      letter-spacing: 0.3px; line-height: 1.1;
    }
    .subtitle {
      font-size: 11px; font-weight: 600;
      color: rgba(255,255,255,0.65);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* Galleria immagini */
    .gallery {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 20px;
    }
    .gallery img {
      width: 100%;
      border-radius: var(--radius);
      display: block;
      box-shadow: 0 2px 12px rgba(13,18,64,0.10);
    }

    /* Nav footer */
    .footer-nav { text-align: center; margin-top: 24px; }
    .homeBtn {
      display: inline-block;
      padding: 12px 28px;
      background: var(--white);
      color: var(--blue);
      font-family: 'Barlow', sans-serif;
      font-size: 14px; font-weight: 700;
      border-radius: var(--radius-sm);
      text-decoration: none;
      box-shadow: 0 2px 8px rgba(54,67,186,0.15);
      transition: background 0.1s;
    }
    .homeBtn:active { background: var(--blue-bg); }
  </style>
</head>
<body>
<div class="wrap">

  <header class="header">
    <div class="brand">
      <div class="logo-wrap">
        <img src="../decathlon-logo.png" alt="Decathlon" class="logo">
      </div>
      <div class="titles">
        <h1>Cabas</h1>
        <p class="subtitle">Lineare · Organizzazione</p>
      </div>
    </div>
  </header>

  <main>
    <div class="gallery">
      <img src="cabas_1.jpg" alt="Cabas – slide 1">
      <img src="cabas_2.jpg" alt="Cabas – slide 2">
      <img src="cabas_3.jpg" alt="Cabas – slide 3">
      <img src="cabas_4.jpg" alt="Cabas – slide 4">
    </div>
  </main>

  <div class="footer-nav">
    <a href="intermag.html" class="homeBtn">← Torna a Lineare</a>
  </div>

</div>
</body>
</html>
