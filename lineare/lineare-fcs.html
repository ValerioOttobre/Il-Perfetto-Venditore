<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#3643BA">
  <title>FCS – Lineare</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root { --blue: #3643BA; --blue-dark: #2A3499; --blue-bg: #EEF0FB; --white: #FFFFFF; --text: #0D1240; --muted: #6370A0; --radius: 16px; --radius-sm: 10px; --gold: #B8860B; --gold-bg: #FFF8E1; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Barlow', sans-serif; background: var(--blue-bg); color: var(--text); min-height: 100dvh; display: flex; flex-direction: column; }
    .wrap { width: 100%; max-width: 540px; margin: 0 auto; padding: 0 16px 32px; flex: 1; display: flex; flex-direction: column; }

    .header { position: sticky; top: 0; z-index: 100; background: var(--blue); margin: 0 -16px; padding: 14px 20px; display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 12px rgba(54,67,186,0.3); }
    .logo-wrap { width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .logo { width: 48px; height: 48px; object-fit: contain; }
    .titles h1 { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 800; color: var(--white); letter-spacing: 0.3px; line-height: 1.1; }
    .subtitle { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.65); letter-spacing: 0.5px; text-transform: uppercase; margin-top: 2px; }

    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 20px; }

    /* TASTO LARGO */
    .wideBtn {
      grid-column: 1 / -1;
      display: flex; flex-direction: row; align-items: center; justify-content: center; gap: 12px;
      padding: 22px 14px;
      background: var(--gold);
      border: none; border-radius: var(--radius); cursor: pointer; text-align: center;
      box-shadow: 0 3px 12px rgba(184,134,11,0.35);
      animation: fadeUp 0.4s ease both;
      animation-delay: 0.06s;
      text-decoration: none;
    }
    .wideBtn:active { background: #9a7009; transform: scale(0.98); }
    .wideBtn .btn-emoji { font-size: 28px; }
    .wideBtn .btn-label { font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 800; color: var(--white); letter-spacing: 0.4px; }

    /* TASTI SPORT */
    .sectionBtn {
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
      padding: 24px 14px;
      background: var(--blue); border: none; border-radius: var(--radius); cursor: pointer; text-align: center;
      transition: transform 0.1s ease, background 0.1s ease;
      box-shadow: 0 3px 12px rgba(54,67,186,0.25);
      animation: fadeUp 0.4s ease both;
      text-decoration: none;
    }
    .sectionBtn:active { transform: scale(0.95); background: var(--blue-dark); }
    .sectionBtn:nth-child(2) { animation-delay: 0.11s; }
    .sectionBtn:nth-child(3) { animation-delay: 0.16s; }
    .sectionBtn:nth-child(4) { animation-delay: 0.21s; }
    .sectionBtn:nth-child(5) { animation-delay: 0.26s; }
    .sectionBtn:nth-child(6) { animation-delay: 0.31s; }
    .sectionBtn:nth-child(7) { animation-delay: 0.36s; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    .btn-emoji { font-size: 32px; line-height: 1; }
    .btn-label { font-size: 13px; font-weight: 700; color: var(--white); line-height: 1.25; }

    .homeBtn { display: block; width: 100%; margin-top: 24px; padding: 14px; background: var(--white); color: var(--blue); text-align: center; border-radius: var(--radius); font-size: 15px; font-weight: 700; text-decoration: none; box-shadow: 0 2px 8px rgba(54,67,186,0.15); }
    .homeBtn:active { background: var(--blue-bg); }
    .footer-nav { margin-top: 0; }
  </style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="logo-wrap">
      <img class="logo" src="../decathlon-logo.png" alt="Decathlon" onerror="this.style.display='none'">
    </div>
    <div class="titles">
      <h1>FCS</h1>
      <div class="subtitle">Lineare · Il Perfetto Venditore</div>
    </div>
  </div>

  <main>
    <div class="grid">

      <a class="wideBtn" href="https://docs.google.com/spreadsheets/d/11acl5r-zH3f7MijBMBUzfdbINWyMDnKyVyZJk7FFq9I/edit?gid=529749601#gid=529749601" target="_blank">
        <span class="btn-emoji">📋</span>
        <span class="btn-label">REGOLE DEL GIOCO</span>
      </a>

      <a class="sectionBtn" href="https://docs.google.com/spreadsheets/d/11acl5r-zH3f7MijBMBUzfdbINWyMDnKyVyZJk7FFq9I/edit?gid=0#gid=0" target="_blank">
        <span class="btn-emoji">🚴</span>
        <span class="btn-label">Ciclismo</span>
      </a>
      <a class="sectionBtn" href="https://docs.google.com/spreadsheets/d/11acl5r-zH3f7MijBMBUzfdbINWyMDnKyVyZJk7FFq9I/edit?gid=142616856#gid=142616856" target="_blank">
        <span class="btn-emoji">🏋️</span>
        <span class="btn-label">Fitness</span>
      </a>
      <a class="sectionBtn" href="https://docs.google.com/spreadsheets/d/11acl5r-zH3f7MijBMBUzfdbINWyMDnKyVyZJk7FFq9I/edit?gid=132088852#gid=132088852" target="_blank">
        <span class="btn-emoji">⛰️</span>
        <span class="btn-label">Montagna</span>
      </a>
      <a class="sectionBtn" href="https://docs.google.com/spreadsheets/d/11acl5r-zH3f7MijBMBUzfdbINWyMDnKyVyZJk7FFq9I/edit?gid=560026613#gid=560026613" target="_blank">
        <span class="btn-emoji">👟</span>
        <span class="btn-label">Running/Natura</span>
      </a>
      <a class="sectionBtn" href="https://docs.google.com/spreadsheets/d/11acl5r-zH3f7MijBMBUzfdbINWyMDnKyVyZJk7FFq9I/edit?gid=1057076224#gid=1057076224" target="_blank">
        <span class="btn-emoji">⚽</span>
        <span class="btn-label">Sport di Palla</span>
      </a>
      <a class="sectionBtn" href="https://docs.google.com/spreadsheets/d/11acl5r-zH3f7MijBMBUzfdbINWyMDnKyVyZJk7FFq9I/edit?gid=22952849#gid=22952849" target="_blank">
        <span class="btn-emoji">🌊</span>
        <span class="btn-label">Water/Winter</span>
      </a>

    </div>
  </main>

  <div class="footer-nav">
    <a href="lineare.html" class="homeBtn">← Torna a Lineare</a>
  </div>

</div>
</body>
</html>
