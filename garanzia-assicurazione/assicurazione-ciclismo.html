<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#3643BA">
  <title>Assicurazione Ciclismo – Il Perfetto Venditore</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue:      #3643BA;
      --blue-dark: #2A3499;
      --blue-bg:   #EEF0FB;
      --white:     #FFFFFF;
      --text:      #0D1240;
      --muted:     #6370A0;
      --radius:    16px;
      --radius-sm: 10px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Barlow', sans-serif; background: var(--blue-bg); color: var(--text); min-height: 100dvh; display: flex; flex-direction: column; }
    .wrap { width: 100%; max-width: 540px; margin: 0 auto; padding: 0 16px 32px; flex: 1; display: flex; flex-direction: column; }

    /* ── Header ── */
    .header { position: sticky; top: 0; z-index: 100; background: var(--blue); margin: 0 -16px; padding: 14px 20px; display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 12px rgba(54,67,186,0.3); }
    .brand { display: flex; align-items: center; gap: 12px; }
    .logo-wrap { width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; }
    .logo { width: 48px; height: 48px; object-fit: contain; }
    .titles h1 { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 800; color: var(--white); letter-spacing: 0.3px; line-height: 1.1; }
    .subtitle { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.65); letter-spacing: 0.8px; text-transform: uppercase; margin-top: 2px; }

    /* ── Placeholder ── */
    .placeholder { background: var(--white); border-radius: var(--radius); padding: 32px 20px; margin-top: 20px; box-shadow: 0 2px 10px rgba(54,67,186,0.08); text-align: center; animation: fadeUp 0.4s 0.08s ease both; }
    .placeholder p { font-size: 15px; font-weight: 600; color: var(--muted); }

    /* ── FAQ invite ── */
    .faq-invite { margin-top: 28px; animation: fadeUp 0.4s 0.20s ease both; }
    .faq-invite-label { text-align: center; font-size: 14px; font-weight: 700; color: var(--muted); margin-bottom: 14px; }
    .faq-invite-label strong { color: var(--blue); }

    /* ── Grid bottoni ── */
    .faq-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .faqSectionBtn { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; padding: 22px 14px; background: var(--blue); border: none; border-radius: var(--radius); cursor: pointer; text-align: center; transition: transform 0.1s ease, background 0.1s ease; box-shadow: 0 3px 12px rgba(54,67,186,0.25); animation: fadeUp 0.4s ease both; }
    .faqSectionBtn:active { transform: scale(0.95); background: var(--blue-dark); }
    .faqSectionBtn:nth-child(1) { animation-delay: 0.25s; }
    .faqSectionBtn:nth-child(2) { animation-delay: 0.30s; }
    .faqSectionBtn:nth-child(3) { animation-delay: 0.35s; }
    .faqSectionBtn:nth-child(4) { animation-delay: 0.40s; }
    .faqSectionBtn .btn-emoji { font-size: 28px; line-height: 1; }
    .faqSectionBtn .btn-label { font-size: 13px; font-weight: 700; color: var(--white); line-height: 1.25; }

    /* ── Nav ── */
    .footer-nav { text-align: center; margin-top: 24px; }
    .homeBtn { display: inline-block; padding: 12px 28px; background: var(--white); color: var(--blue); font-family: 'Barlow', sans-serif; font-size: 14px; font-weight: 700; border-radius: var(--radius-sm); text-decoration: none; box-shadow: 0 2px 8px rgba(54,67,186,0.15); transition: background 0.1s; }
    .homeBtn:active { background: var(--blue-bg); }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
<div class="wrap">

  <header class="header">
    <div class="brand">
      <div class="logo-wrap">
        <img src="../decathlon-logo.png" alt="Decathlon" class="logo">
      </div>
      <div class="titles">
        <h1>Assicurazione Ciclismo</h1>
        <p class="subtitle">Bici · Copertura · Attivazione</p>
      </div>
    </div>
  </header>

  <!-- ── PLACEHOLDER ── -->
  <div class="placeholder">
    <p>Inserire testo</p>
  </div>

  <!-- ── FAQ INVITE ── -->
  <div class="faq-invite">
    <p class="faq-invite-label">Se hai ulteriori dubbi consulta le <strong>F.A.Q.</strong></p>
    <div class="faq-grid">
      <button class="faqSectionBtn" onclick="location.href='ac-faq-vendita.html'">
        <span class="btn-emoji">🛒</span>
        <span class="btn-label">Vendita</span>
      </button>
      <button class="faqSectionBtn" onclick="location.href='ac-faq-contratto.html'">
        <span class="btn-emoji">📄</span>
        <span class="btn-label">Contratto</span>
      </button>
      <button class="faqSectionBtn" onclick="location.href='ac-faq-attivazione.html'">
        <span class="btn-emoji">✅</span>
        <span class="btn-label">Attivazione</span>
      </button>
      <button class="faqSectionBtn" onclick="location.href='ac-faq-assistenza.html'">
        <span class="btn-emoji">🧰</span>
        <span class="btn-label">Assistenza</span>
      </button>
    </div>
  </div>

  <div class="footer-nav">
    <a href="garanzia-assicurazione.html" class="homeBtn">← Torna a Garanzia e Assicurazione</a>
  </div>

</div>
</body>
</html>
