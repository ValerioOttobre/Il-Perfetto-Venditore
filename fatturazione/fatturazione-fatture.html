<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#3643BA">
  <title>Fatturazione – Il Perfetto Venditore</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue:      #3643BA;
      --blue-dark: #2A3499;
      --blue-bg:   #EEF0FB;
      --white:     #FFFFFF;
      --text:      #0D1240;
      --muted:     #6370A0;
      --radius:    16px;
      --radius-sm: 10px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Barlow', sans-serif; background: var(--blue-bg); color: var(--text); min-height: 100dvh; display: flex; flex-direction: column; }
    .wrap { width: 100%; max-width: 540px; margin: 0 auto; padding: 0 16px 32px; flex: 1; display: flex; flex-direction: column; }
    .header { position: sticky; top: 0; z-index: 100; background: var(--blue); margin: 0 -16px; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; gap: 12px; box-shadow: 0 2px 12px rgba(54,67,186,0.3); }
    .brand { display: flex; align-items: center; gap: 12px; }
    .logo-wrap { width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; }
    .logo { width: 48px; height: 48px; object-fit: contain; }
    .titles h1 { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 800; color: var(--white); letter-spacing: 0.3px; line-height: 1.1; }
    .subtitle { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.65); letter-spacing: 0.8px; text-transform: uppercase; margin-top: 2px; }
    .faqBtn { background: rgba(255,255,255,0.15); border: 1.5px solid rgba(255,255,255,0.5); color: var(--white); font-family: 'Barlow', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.6px; padding: 7px 13px; border-radius: var(--radius-sm); cursor: pointer; text-decoration: none; transition: background 0.15s ease, border-color 0.15s ease; flex-shrink: 0; }
    .faqBtn:active { background: rgba(255,255,255,0.28); border-color: rgba(255,255,255,0.8); }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 20px; }
    .sectionBtn { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; padding: 24px 14px; background: var(--blue); border: none; border-radius: var(--radius); cursor: pointer; text-align: center; transition: transform 0.1s ease, background 0.1s ease; box-shadow: 0 3px 12px rgba(54,67,186,0.25); animation: fadeUp 0.4s ease both; }
    .sectionBtn:active { transform: scale(0.95); background: var(--blue-dark); }
    .sectionBtn:nth-child(1) { animation-delay: 0.08s; }
    .sectionBtn:nth-child(2) { animation-delay: 0.13s; }
    .sectionBtn:nth-child(3) { animation-delay: 0.18s; }
    .sectionBtn:nth-child(4) { animation-delay: 0.23s; }
    .sectionBtn:nth-child(5) { animation-delay: 0.28s; }
    .sectionBtn:nth-child(6) { animation-delay: 0.33s; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    .btn-emoji { font-size: 32px; line-height: 1; }
    .btn-label { font-size: 13px; font-weight: 700; color: var(--white); line-height: 1.25; }
    .homeBtn { display: inline-block; margin-top: 24px; padding: 12px 28px; background: var(--white); color: var(--blue); font-family: 'Barlow', sans-serif; font-size: 14px; font-weight: 700; border-radius: var(--radius-sm); text-decoration: none; box-shadow: 0 2px 8px rgba(54,67,186,0.15); transition: background 0.1s; }
    .homeBtn:active { background: var(--blue-bg); }
    .footer-nav { text-align: center; }
  </style>
</head>
<body>
<div class="wrap">

  <header class="header">
    <div class="brand">
      <div class="logo-wrap">
        <img src="../decathlon-logo.png" alt="Decathlon" class="logo">
      </div>
      <div class="titles">
        <h1>Fatturazione</h1>
        <p class="subtitle">Fatture · IVA · Tax Free</p>
      </div>
    </div>
    <a class="faqBtn" href="fatturazione-faq.html">F.A.Q.</a>
  </header>

  <main>
    <div class="grid">
      <button class="sectionBtn" onclick="location.href='fatturazione-cambiare-prodotto-fatturato.html'">
        <span class="btn-emoji">🔄</span>
        <span class="btn-label">Cambiare un Prodotto Fatturato</span>
      </button>
      <button class="sectionBtn" onclick="location.href='fatturazione-cercare-fattura.html'">
        <span class="btn-emoji">🔍</span>
        <span class="btn-label">Cercare una Fattura</span>
      </button>
      <button class="sectionBtn" onclick="location.href='fatturazione-fattura-privati.html'">
        <span class="btn-emoji">👤</span>
        <span class="btn-label">Fattura Privati</span>
      </button>
      <button class="sectionBtn" onclick="location.href='fatturazione-fattura-societa.html'">
        <span class="btn-emoji">🏢</span>
        <span class="btn-label">Fattura Società</span>
      </button>
      <button class="sectionBtn" onclick="location.href='fatturazione-tax-free.html'">
        <span class="btn-emoji">✈️</span>
        <span class="btn-label">Tax Free</span>
      </button>
      <button class="sectionBtn" onclick="location.href='documenti-iva-speciale.html'">
        <span class="btn-emoji">📋</span>
        <span class="btn-label">Documenti IVA Speciale</span>
      </button>
    </div>
  </main>

  <div class="footer-nav">
    <a href="fatturazione.html" class="homeBtn">← Torna a Servizi e Fatturazione</a>
  </div>

</div>
</body>
</html>
