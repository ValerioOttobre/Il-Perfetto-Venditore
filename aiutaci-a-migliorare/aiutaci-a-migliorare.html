<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#3643BA">
  <title>Aiutaci a Migliorare</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue:      #3643BA;
      --blue-dark: #2A3499;
      --blue-bg:   #EEF0FB;
      --white:     #FFFFFF;
      --text:      #0D1240;
      --muted:     #6370A0;
      --radius:    16px;
      --radius-sm: 10px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--blue-bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    .wrap {
      width: 100%;
      max-width: 540px;
      margin: 0 auto;
      padding: 0 16px 32px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--blue);
      margin: 0 -16px;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      box-shadow: 0 2px 12px rgba(54,67,186,0.3);
    }

    .brand { display: flex; align-items: center; gap: 12px; }

    .logo-wrap {
      width: 48px; height: 48px;
      background: transparent;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; overflow: hidden;
    }

    .logo { width: 48px; height: 48px; object-fit: contain; }

    .titles h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px; font-weight: 800;
      color: var(--white); letter-spacing: 0.3px; line-height: 1.1;
    }

    .subtitle {
      font-size: 11px; font-weight: 600;
      color: rgba(255,255,255,0.65);
      letter-spacing: 0.8px; text-transform: uppercase; margin-top: 2px;
    }

    /* GRID 2 COLONNE */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 20px;
    }

    .sectionBtn {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px;
      aspect-ratio: 1 / 1;
      padding: 14px 10px;
      background: var(--blue);
      border: none; border-radius: var(--radius);
      cursor: pointer; text-align: center;
      transition: transform 0.1s ease, background 0.1s ease;
      box-shadow: 0 3px 12px rgba(54,67,186,0.25);
      animation: fadeUp 0.4s ease both;
    }
    .sectionBtn:active { transform: scale(0.95); background: var(--blue-dark); }
    .sectionBtn:nth-child(1) { animation-delay: 0.08s; }
    .sectionBtn:nth-child(2) { animation-delay: 0.13s; }
    .sectionBtn:nth-child(3) { animation-delay: 0.18s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .btn-emoji { font-size: 32px; line-height: 1; }
    .btn-label {
      font-size: 12px; font-weight: 700;
      color: var(--white); line-height: 1.25;
    }

    /* BACHECA */
    .bacheca {
      margin-top: 20px;
      display: flex; flex-direction: column; gap: 12px;
    }

    .domanda-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: 0 3px 12px rgba(54,67,186,0.1);
      animation: fadeUp 0.3s ease both;
    }

    .domanda-testo {
      font-size: 15px; font-weight: 600;
      color: var(--text); margin-bottom: 6px;
    }

    .domanda-meta {
      font-size: 12px; color: var(--muted);
    }

    .nessuna {
      text-align: center; color: var(--muted);
      font-size: 14px; padding: 32px 0;
    }

    /* HOME BTN */
    .home-wrap {
      margin-top: 24px; text-align: center;
    }

    .homeBtn {
      display: inline-block;
      font-family: 'Barlow', sans-serif;
      font-size: 13px; font-weight: 700;
      color: var(--blue);
      text-decoration: none;
      letter-spacing: 0.3px;
    }

    /* FOOTER */
    footer {
      margin-top: 24px; text-align: center;
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.5px; color: var(--muted);
      text-transform: uppercase;
    }

    /* MODALE */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(13,18,64,0.5);
      z-index: 200;
      align-items: center; justify-content: center;
      padding: 20px;
    }

    .modal-box {
      background: var(--white);
      border-radius: var(--radius);
      padding: 24px 20px;
      width: 100%; max-width: 400px;
    }

    .modal-box h2 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px; font-weight: 800;
      color: var(--text); margin-bottom: 8px;
    }

    .modal-box p {
      font-size: 14px; color: var(--muted); margin-bottom: 16px;
    }

    .question-textarea {
      width: 100%; min-height: 120px;
      padding: 12px 14px;
      font-family: 'Barlow', sans-serif;
      font-size: 15px; color: var(--text);
      border: 2px solid var(--blue-bg);
      border-radius: var(--radius-sm);
      resize: none; outline: none;
    }
    .question-textarea:focus { border-color: var(--blue); }

    .modal-actions {
      display: flex; gap: 10px; margin-top: 16px;
    }

    .modal-btn {
      flex: 1; padding: 13px;
      font-family: 'Barlow', sans-serif;
      font-size: 14px; font-weight: 700;
      border: none; border-radius: var(--radius-sm);
      cursor: pointer;
    }
    .modal-btn.cancel { background: var(--blue-bg); color: var(--muted); }
    .modal-btn.confirm { background: var(--blue); color: var(--white); }
  </style>
</head>
<body>
<div class="wrap">

  <!-- HEADER -->
  <header class="header">
    <div class="brand">
      <div class="logo-wrap">
        <img src="../decathlon-logo.png" alt="Decathlon" class="logo">
      </div>
      <div class="titles">
        <h1>Aiutaci a Migliorare</h1>
        <p class="subtitle">Sito sempre aggiornato</p>
      </div>
    </div>
    <span style="width:40px;"></span>
  </header>

  <!-- TASTI -->
  <div class="grid">
    <button class="sectionBtn" id="btnNuova">
      <span class="btn-emoji">✏️</span>
      <span class="btn-label">Nuova Domanda</span>
    </button>
    <button class="sectionBtn" id="btnAdmin">
      <span class="btn-emoji">🔒</span>
      <span class="btn-label">Area Admin</span>
    </button>
    <button class="sectionBtn" id="btnBacheca">
      <span class="btn-emoji">📋</span>
      <span class="btn-label">Leggi Domande</span>
    </button>
  </div>

  <!-- BACHECA (nascosta di default) -->
  <div class="bacheca" id="bacheca" style="display:none;"></div>

  <div class="home-wrap">
    <a href="../index.html" class="homeBtn">← Torna alla Home</a>
  </div>

  <footer>© Il Perfetto Venditore</footer>
</div>

<!-- MODALE NUOVA DOMANDA -->
<div id="modalNuova" class="modal-overlay">
  <div class="modal-box">
    <h2>Nuova domanda</h2>
    <p>Scrivi un dubbio o una segnalazione — ci aiuti a migliorare.</p>
    <textarea id="questionInput" class="question-textarea" placeholder="Scrivi qui..."></textarea>
    <div class="modal-actions">
      <button class="modal-btn cancel" id="btnAnnullaNuova">Annulla</button>
      <button class="modal-btn confirm" id="btnInvia">Invia</button>
    </div>
  </div>
</div>

<!-- MODALE PASSWORD BACHECA -->
<div id="modalBacheca" class="modal-overlay">
  <div class="modal-box">
    <h2>Accesso riservato</h2>
    <p>Inserisci la password per leggere le domande.</p>
    <textarea id="pwdBacheca" class="question-textarea" style="min-height:60px;" placeholder="Password..."></textarea>
    <div class="modal-actions">
      <button class="modal-btn cancel" id="btnAnnullaBacheca">Annulla</button>
      <button class="modal-btn confirm" id="btnAccediBacheca">Accedi</button>
    </div>
  </div>
</div>

<!-- MODALE ADMIN -->
<div id="modalAdmin" class="modal-overlay">
  <div class="modal-box">
    <h2>Area Admin</h2>
    <p>Inserisci la password per eliminare tutte le domande.</p>
    <textarea id="pwdAdmin" class="question-textarea" style="min-height:60px;" placeholder="Password..."></textarea>
    <div class="modal-actions">
      <button class="modal-btn cancel" id="btnAnnullaAdmin">Annulla</button>
      <button class="modal-btn confirm" id="btnAccediAdmin">Accedi</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCm0bPUUOYtq0jowTbPhiUu4pWGd40ycOc",
    authDomain: "il-perfetto-venditore.firebaseapp.com",
    databaseURL: "https://il-perfetto-venditore-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "il-perfetto-venditore",
    storageBucket: "il-perfetto-venditore.firebasestorage.app",
    messagingSenderId: "48604769561",
    appId: "1:48604769561:web:6207fa32bd75af612ea988"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const domandeRef = ref(db, "domande");

  // Modale nuova domanda
  document.getElementById('btnNuova').addEventListener('click', () => {
    document.getElementById('modalNuova').style.display = 'flex';
  });
  document.getElementById('btnAnnullaNuova').addEventListener('click', () => {
    document.getElementById('modalNuova').style.display = 'none';
    document.getElementById('questionInput').value = '';
  });
  document.getElementById('btnInvia').addEventListener('click', () => {
    const testo = document.getElementById('questionInput').value.trim();
    if (!testo) { alert('Scrivi una domanda prima di inviare.'); return; }
    push(domandeRef, { testo, data: new Date().toLocaleString('it-IT') });
    document.getElementById('questionInput').value = '';
    document.getElementById('modalNuova').style.display = 'none';
    alert('Domanda inviata!');
  });

  // Modale bacheca con password
  document.getElementById('btnBacheca').addEventListener('click', () => {
    document.getElementById('modalBacheca').style.display = 'flex';
  });
  document.getElementById('btnAnnullaBacheca').addEventListener('click', () => {
    document.getElementById('modalBacheca').style.display = 'none';
    document.getElementById('pwdBacheca').value = '';
  });
  document.getElementById('btnAccediBacheca').addEventListener('click', () => {
    const pwd = document.getElementById('pwdBacheca').value;
    if (pwd === 'avoingresso') {
      document.getElementById('modalBacheca').style.display = 'none';
      document.getElementById('pwdBacheca').value = '';
      mostraBacheca();
    } else {
      alert('Password non corretta.');
    }
  });

  // Modale admin
  document.getElementById('btnAdmin').addEventListener('click', () => {
    document.getElementById('modalAdmin').style.display = 'flex';
  });
  document.getElementById('btnAnnullaAdmin').addEventListener('click', () => {
    document.getElementById('modalAdmin').style.display = 'none';
    document.getElementById('pwdAdmin').value = '';
  });
  document.getElementById('btnAccediAdmin').addEventListener('click', () => {
    const pwd = document.getElementById('pwdAdmin').value;
    if (pwd === 'dipunziomagico') {
      if (confirm('Vuoi eliminare tutte le domande?')) { remove(domandeRef); }
      document.getElementById('modalAdmin').style.display = 'none';
      document.getElementById('pwdAdmin').value = '';
    } else {
      alert('Password non corretta.');
    }
  });

  function mostraBacheca() {
    const bacheca = document.getElementById('bacheca');
    bacheca.style.display = 'flex';
    bacheca.innerHTML = '<p class="nessuna">Caricamento...</p>';
    onValue(domandeRef, (snapshot) => {
      bacheca.innerHTML = '';
      if (!snapshot.exists()) {
        bacheca.innerHTML = '<p class="nessuna">Nessuna domanda ancora.</p>';
        return;
      }
      const domande = [];
      snapshot.forEach(child => domande.push({ id: child.key, ...child.val() }));
      domande.reverse().forEach(d => {
        const card = document.createElement('div');
        card.className = 'domanda-card';
        card.innerHTML = `<div class="domanda-testo">${d.testo}</div><div class="domanda-meta">${d.data}</div>`;
        bacheca.appendChild(card);
      });
    });
  }
</script>
</body>
</html>
