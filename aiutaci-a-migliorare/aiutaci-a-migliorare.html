<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#3643BA">
  <title>Aiutaci a Migliorare</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue:      #3643BA;
      --blue-dark: #2A3499;
      --blue-bg:   #EEF0FB;
      --white:     #FFFFFF;
      --text:      #0D1240;
      --muted:     #6370A0;
      --radius:    16px;
      --radius-sm: 10px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Barlow', sans-serif;
      background: var(--blue-bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex; flex-direction: column;
    }
    .wrap {
      width: 100%; max-width: 540px;
      margin: 0 auto; padding: 0 16px 32px;
      flex: 1; display: flex; flex-direction: column;
    }
    .header {
      position: sticky; top: 0; z-index: 100;
      background: var(--blue);
      margin: 0 -16px; padding: 14px 20px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px;
      box-shadow: 0 2px 12px rgba(54,67,186,0.3);
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .logo-wrap {
      width: 48px; height: 48px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; overflow: hidden;
      cursor: pointer;
    }
    .logo { width: 48px; height: 48px; object-fit: contain; }
    .titles h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px; font-weight: 800;
      color: var(--white); letter-spacing: 0.3px; line-height: 1.1;
    }
    .subtitle {
      font-size: 11px; font-weight: 600;
      color: rgba(255,255,255,0.65);
      letter-spacing: 0.8px; text-transform: uppercase; margin-top: 2px;
    }
    .homeBtn {
      font-family: 'Barlow', sans-serif;
      font-size: 13px; font-weight: 700;
      color: var(--white); text-decoration: none;
      background: rgba(255,255,255,0.15);
      border: none; border-radius: 10px;
      padding: 10px 14px; cursor: pointer;
      white-space: nowrap;
    }
    .homeBtn:active { background: rgba(255,255,255,0.25); }

    /* TASTI PRINCIPALI */
    .main-actions {
      display: flex; flex-direction: column;
      gap: 14px; margin-top: 32px; flex: 1;
    }
    .bigBtn {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; padding: 40px 20px;
      background: var(--blue);
      border: none; border-radius: var(--radius);
      cursor: pointer;
      box-shadow: 0 3px 12px rgba(54,67,186,0.25);
      transition: transform 0.1s ease, background 0.1s ease;
      animation: fadeUp 0.35s ease both;
    }
    .bigBtn:active { transform: scale(0.97); background: var(--blue-dark); }
    .bigBtn .btn-emoji { font-size: 42px; line-height: 1; }
    .bigBtn .btn-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 22px; font-weight: 800;
      color: var(--white); letter-spacing: 0.3px;
    }

    .smallBtn {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; padding: 20px;
      background: var(--white);
      border: none; border-radius: var(--radius);
      cursor: pointer;
      box-shadow: 0 3px 12px rgba(54,67,186,0.1);
      transition: transform 0.1s ease, background 0.1s ease;
      animation: fadeUp 0.35s 0.1s ease both;
    }
    .smallBtn:active { transform: scale(0.97); background: var(--blue-bg); }
    .smallBtn .btn-emoji { font-size: 26px; line-height: 1; }
    .smallBtn .btn-label {
      font-size: 14px; font-weight: 700;
      color: var(--blue);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    footer {
      margin-top: 24px; text-align: center;
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.5px; color: var(--muted);
      text-transform: uppercase;
    }

    /* MODALE */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(13,18,64,0.5);
      z-index: 200;
      align-items: center; justify-content: center;
      padding: 20px;
    }
    .modal-box {
      background: var(--white);
      border-radius: var(--radius);
      padding: 24px 20px;
      width: 100%; max-width: 400px;
    }
    .modal-box h2 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px; font-weight: 800;
      color: var(--text); margin-bottom: 8px;
    }
    .modal-box p {
      font-size: 14px; color: var(--muted); margin-bottom: 16px;
    }
    .question-textarea {
      width: 100%; min-height: 120px;
      padding: 12px 14px;
      font-family: 'Barlow', sans-serif;
      font-size: 15px; color: var(--text);
      border: 2px solid var(--blue-bg);
      border-radius: var(--radius-sm);
      resize: none; outline: none;
    }
    .question-textarea:focus { border-color: var(--blue); }
    .pwd-input {
      width: 100%; min-height: 52px;
      padding: 12px 14px;
      font-family: 'Barlow', sans-serif;
      font-size: 15px; color: var(--text);
      border: 2px solid var(--blue-bg);
      border-radius: var(--radius-sm);
      resize: none; outline: none;
    }
    .pwd-input:focus { border-color: var(--blue); }
    .modal-actions {
      display: flex; gap: 10px; margin-top: 16px;
    }
    .modal-btn {
      flex: 1; padding: 13px;
      font-family: 'Barlow', sans-serif;
      font-size: 14px; font-weight: 700;
      border: none; border-radius: var(--radius-sm);
      cursor: pointer;
    }
    .modal-btn.cancel { background: var(--blue-bg); color: var(--muted); }
    .modal-btn.confirm { background: var(--blue); color: var(--white); }
  </style>
</head>
<body>
<div class="wrap">

  <header class="header">
    <div class="brand">
      <div class="logo-wrap" id="logoBtn">
        <img src="../decathlon-logo.png" alt="Decathlon" class="logo">
      </div>
      <div class="titles">
        <h1>Aiutaci a Migliorare</h1>
        <p class="subtitle">Sito sempre aggiornato</p>
      </div>
    </div>
    <a href="../index.html" class="homeBtn">← Home</a>
  </header>

  <div class="main-actions">
    <button class="bigBtn" id="btnNuova">
      <span class="btn-emoji">✏️</span>
      <span class="btn-label">Scrivi una Domanda</span>
    </button>
    <button class="smallBtn" id="btnCrediti">
      <span class="btn-emoji">🙏</span>
      <span class="btn-label">Crediti</span>
    </button>
  </div>

  <footer>© Il Perfetto Venditore</footer>
</div>

<!-- MODALE NUOVA DOMANDA -->
<div id="modalNuova" class="modal-overlay">
  <div class="modal-box">
    <h2>Nuova domanda</h2>
    <p>Scrivi un dubbio o una segnalazione — ci aiuti a migliorare.</p>
    <textarea id="questionInput" class="question-textarea" placeholder="Scrivi qui..."></textarea>
    <div class="modal-actions">
      <button class="modal-btn cancel" id="btnAnnulla">Annulla</button>
      <button class="modal-btn confirm" id="btnInvia">Invia</button>
    </div>
  </div>
</div>

<!-- MODALE PASSWORD LOGO -->
<div id="modalPwd" class="modal-overlay">
  <div class="modal-box">
    <h2>Area riservata</h2>
    <p>Inserisci la password per accedere alle domande.</p>
    <textarea id="pwdInput" class="pwd-input" placeholder="Password..."></textarea>
    <div class="modal-actions">
      <button class="modal-btn cancel" id="btnAnnullaPwd">Annulla</button>
      <button class="modal-btn confirm" id="btnAccedi">Accedi</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCm0bPUUOYtq0jowTbPhiUu4pWGd40ycOc",
    authDomain: "il-perfetto-venditore.firebaseapp.com",
    databaseURL: "https://il-perfetto-venditore-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "il-perfetto-venditore",
    storageBucket: "il-perfetto-venditore.firebasestorage.app",
    messagingSenderId: "48604769561",
    appId: "1:48604769561:web:6207fa32bd75af612ea988"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const domandeRef = ref(db, "domande");

  // Nuova domanda
  document.getElementById('btnNuova').addEventListener('click', () => {
    document.getElementById('modalNuova').style.display = 'flex';
  });
  document.getElementById('btnAnnulla').addEventListener('click', () => {
    document.getElementById('modalNuova').style.display = 'none';
    document.getElementById('questionInput').value = '';
  });
  document.getElementById('btnInvia').addEventListener('click', () => {
    const testo = document.getElementById('questionInput').value.trim();
    if (!testo) { alert('Scrivi una domanda prima di inviare.'); return; }
    push(domandeRef, { testo, data: new Date().toLocaleString('it-IT') });
    document.getElementById('questionInput').value = '';
    document.getElementById('modalNuova').style.display = 'none';
    alert('Domanda inviata!');
  });

  // Logo — password per box domande
  document.getElementById('logoBtn').addEventListener('click', () => {
    document.getElementById('modalPwd').style.display = 'flex';
  });
  document.getElementById('btnAnnullaPwd').addEventListener('click', () => {
    document.getElementById('modalPwd').style.display = 'none';
    document.getElementById('pwdInput').value = '';
  });
  document.getElementById('btnAccedi').addEventListener('click', () => {
    const pwd = document.getElementById('pwdInput').value.trim();
    if (pwd === 'avoingresso') {
      window.location.href = 'box-domande.html';
    } else {
      alert('Password non corretta.');
      document.getElementById('pwdInput').value = '';
    }
  });

  // Crediti
  document.getElementById('btnCrediti').addEventListener('click', () => {
    window.location.href = 'crediti.html';
  });
</script>
</body>
</html>
