<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#3643BA">
  <title>Il Perfetto Venditore</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue:      #3643BA;
      --blue-dark: #2A3499;
      --blue-bg:   #EEF0FB;
      --white:     #FFFFFF;
      --text:      #0D1240;
      --muted:     #6370A0;
      --radius:    16px;
      --radius-sm: 10px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--blue-bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    .wrap {
      width: 100%;
      max-width: 540px;
      margin: 0 auto;
      padding: 0 16px 32px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .header {
      position: sticky; top: 0; z-index: 100;
      background: var(--blue); margin: 0 -16px;
      padding: 14px 20px; display: flex;
      align-items: center; justify-content: space-between;
      gap: 12px; box-shadow: 0 2px 12px rgba(54,67,186,0.3);
    }

    .brand { display: flex; align-items: center; gap: 12px; }

    .logo-wrap {
      width: 48px; height: 48px; background: transparent;
      border-radius: 0; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0; overflow: hidden;
    }

    .logo { width: 48px; height: 48px; object-fit: contain; }

    .titles h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px; font-weight: 800;
      color: var(--white); letter-spacing: 0.3px; line-height: 1.1;
    }

    .subtitle {
      font-size: 11px; font-weight: 600;
      color: rgba(255,255,255,0.65);
      letter-spacing: 0.8px; text-transform: uppercase; margin-top: 2px;
    }

    .searchBtn {
      background: rgba(255,255,255,0.15); border: none;
      border-radius: 10px; width: 40px; height: 40px;
      font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 0.15s;
    }
    .searchBtn:active { background: rgba(255,255,255,0.25); }

    .search-wrap {
      overflow: hidden; max-height: 0;
      transition: max-height 0.25s ease, padding 0.25s ease;
      background: var(--blue-dark); margin: 0 -16px;
    }
    .search-wrap.open { max-height: 80px; padding: 10px 16px 12px; }

    #searchInput {
      width: 100%; padding: 12px 16px;
      font-family: 'Barlow', sans-serif; font-size: 16px; font-weight: 500;
      border: none; border-radius: var(--radius-sm);
      background: var(--white); color: var(--text); outline: none;
    }
    #searchInput::placeholder { color: var(--muted); }

    /* ── OPECO ── */
    .opeco-wrap { margin-top: 20px; }

    .opecoBtn {
      width: 100%; height: 110px; display: block;
      border: none; border-radius: var(--radius);
      cursor: pointer; overflow: hidden; position: relative;
      box-shadow: 0 3px 14px rgba(54,67,186,0.25);
      animation: fadeUp 0.3s ease both; background: var(--blue);
    }
    .opecoBtn:active { transform: scale(0.98); }

    .opeco-img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: center; display: block;
    }

    .opeco-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(90deg, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0.05) 100%);
    }

    .opeco-label {
      position: absolute; bottom: 12px; left: 14px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px; font-weight: 800;
      letter-spacing: 1.2px; text-transform: uppercase;
      color: rgba(255,255,255,0.75);
    }

    .accent-wrap { margin-top: 12px; }

    .accentBtn {
      width: 100%; display: flex; align-items: center;
      justify-content: center; gap: 12px; padding: 18px 20px;
      background: var(--white); border: none; border-radius: var(--radius);
      cursor: pointer; text-align: center;
      box-shadow: 0 3px 12px rgba(54,67,186,0.12);
      transition: transform 0.1s ease, background 0.1s ease;
      animation: fadeUp 0.3s ease both;
    }
    .accentBtn:active { transform: scale(0.98); background: var(--blue-bg); }
    .accentBtn .btn-emoji { font-size: 26px; line-height: 1; flex-shrink: 0; }
    .accentBtn .btn-label { font-size: 16px; font-weight: 800; color: var(--blue); }

    .grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 12px; margin-top: 12px;
    }

    .sectionBtn {
      position: relative; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px;
      aspect-ratio: 1 / 1; padding: 14px 10px; background: var(--blue);
      border: none; border-radius: var(--radius); cursor: pointer;
      text-align: center; transition: transform 0.1s ease, background 0.1s ease;
      box-shadow: 0 3px 12px rgba(54,67,186,0.25); animation: fadeUp 0.4s ease both;
    }
    .sectionBtn:active { transform: scale(0.95); background: var(--blue-dark); }

    .sectionBtn:nth-child(1) { animation-delay: 0.08s; }
    .sectionBtn:nth-child(2) { animation-delay: 0.13s; }
    .sectionBtn:nth-child(3) { animation-delay: 0.18s; }
    .sectionBtn:nth-child(4) { animation-delay: 0.23s; }
    .sectionBtn:nth-child(5) { animation-delay: 0.28s; }
    .sectionBtn:nth-child(6) { animation-delay: 0.33s; }
    .sectionBtn:nth-child(7) { animation-delay: 0.38s; }
    .sectionBtn:nth-child(8) { animation-delay: 0.43s; }
    .sectionBtn:nth-child(9) { animation-delay: 0.48s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .btn-emoji { font-size: 32px; line-height: 1; }
    .btn-label { font-size: 12px; font-weight: 700; color: var(--white); line-height: 1.25; }

    .empty {
      display: none; grid-column: 1 / -1;
      text-align: center; padding: 40px 20px;
      color: var(--muted); font-size: 15px;
    }

    .tips-wrap {
      margin-top: 20px; background: var(--blue);
      border-radius: var(--radius); padding: 18px 20px;
      box-shadow: 0 3px 12px rgba(54,67,186,0.25);
      animation: fadeUp 0.4s 0.55s ease both;
    }

    .tips-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }

    .tips-label {
      font-size: 10px; font-weight: 800;
      letter-spacing: 1.2px; text-transform: uppercase;
      color: rgba(255,255,255,0.55);
    }

    .tips-icon { font-size: 14px; }

    .tip-text {
      font-size: 15px; font-weight: 600;
      color: var(--white); line-height: 1.5; font-style: italic;
    }

    footer {
      margin-top: 24px; text-align: center;
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.5px; color: var(--muted); text-transform: uppercase;
    }
  </style>
</head>
<body>
<div class="wrap">

  <header class="header">
    <div class="brand">
      <div class="logo-wrap">
        <img src="decathlon-logo.png" alt="Decathlon" class="logo">
      </div>
      <div class="titles">
        <h1>Il Perfetto Venditore</h1>
        <p class="subtitle">Chiedi ai Trainer</p>
      </div>
    </div>
    <button class="searchBtn" id="searchBtn" aria-label="Cerca">🔍</button>
  </header>

  <div class="search-wrap" id="searchWrap">
    <input id="searchInput" type="search" placeholder="Cerca una sezione…" autocomplete="off">
  </div>

  <div class="opeco-wrap">
    <button class="opecoBtn" id="opecoBtn">
      <img class="opeco-img" id="opecoImg" src="" alt="Campagna attiva">
      <div class="opeco-overlay"></div>
      <span class="opeco-label" id="opecoLabel">Campagna in corso</span>
    </button>
  </div>

  <main>
    <div class="grid" id="sectionsGrid">
      <button class="sectionBtn" data-name="b2b club aziende tessera associazioni" data-href="b2b/b2b.html">
        <span class="btn-emoji">🤝</span>
        <span class="btn-label">B2B</span>
      </button>
      <button class="sectionBtn" data-name="second hand usato riacquisto vendita usato reso" data-href="second-hand/second-hand.html">
        <span class="btn-emoji">♻️</span>
        <span class="btn-label">Second Hand</span>
      </button>
      <button class="sectionBtn" data-name="assistenza riparazione laboratorio prodotto rotto" data-href="assistenza/assistenza.html">
        <span class="btn-emoji">🧰</span>
        <span class="btn-label">Assistenza</span>
      </button>
      <button class="sectionBtn" data-name="account decathlon carta reso buono cliente rimborso" data-href="carta-decathlon/carta-decathlon.html">
        <span class="btn-emoji">🎫</span>
        <span class="btn-label">Account Decathlon</span>
      </button>
      <button class="sectionBtn" data-name="servizi fatturazione fattura partita iva azienda documento" data-href="fatturazione/fatturazione.html">
        <span class="btn-emoji">🧾</span>
        <span class="btn-label">Servizi e Fatturazione</span>
      </button>
      <button class="sectionBtn" data-name="garanzia assicurazione protezione prodotto danno" data-href="garanzia-assicurazione/garanzia-assicurazione.html">
        <span class="btn-emoji">🛡️</span>
        <span class="btn-label">Garanzia e Assicurazione</span>
      </button>
      <button class="sectionBtn" data-name="incasso cassa pagamento contanti carta" data-href="incasso/incasso.html">
        <span class="btn-emoji">🏧</span>
        <span class="btn-label">Incasso</span>
      </button>
      <button class="sectionBtn" data-name="lineare intermag trasferimento magazzino negozio prodotto" data-href="lineare/lineare.html">
        <span class="btn-emoji"> 🥋 🩱</span>
        <span class="btn-label">Lineare</span>
      </button>
      <button class="sectionBtn" data-name="ordine plus intermag ordine cliente prodotto spedizione" data-href="ordine-plus/ordine-plus.html">
        <span class="btn-emoji">📦</span>
        <span class="btn-label">Ordine Plus e Intermag</span>
      </button>
      <p class="empty" id="emptyMsg">Nessuna sezione trovata.</p>
    </div>
  </main>

  <div class="accent-wrap">
    <button class="accentBtn" data-name="aiutaci migliorare feedback suggerimenti sito" data-href="aiutaci-a-migliorare/aiutaci-a-migliorare.html">
      <span class="btn-emoji">😁</span>
      <span class="btn-label">Aiutaci a Migliorare!</span>
    </button>
  </div>

  <div class="tips-wrap">
    <div class="tips-header">
      <span class="tips-icon">💡</span>
      <span class="tips-label">Tip del giorno</span>
    </div>
    <p class="tip-text" id="tipText"></p>
  </div>

  <footer>© Il Perfetto Venditore</footer>
</div>

<script>
  // ── OPECO ──
  // Per aggiungere una nuova campagna: aggiungi un oggetto all'array.
  // immagine: il file va caricato nella cartella opeco/
  const opeco = [
    {
      inizio:   "2026-03-15",
      fine:     "2026-04-14",
      immagine: "opeco/opeco-run.jpg",
      titolo:   "Run Your Next Challenge",
      link:     "opeco/opeco.html"
    }
  ];

  function getOpecoAttiva() {
    const oggi = new Date();
    oggi.setHours(0, 0, 0, 0);
    return opeco.find(o => {
      const start = new Date(o.inizio);
      const end   = new Date(o.fine);
      end.setHours(23, 59, 59);
      return oggi >= start && oggi <= end;
    });
  }

  const attiva = getOpecoAttiva();
  if (attiva) {
    document.getElementById('opecoImg').src           = attiva.immagine;
    document.getElementById('opecoImg').alt           = attiva.titolo;
    document.getElementById('opecoLabel').textContent = attiva.titolo;
    document.getElementById('opecoBtn').addEventListener('click', () => {
      window.location.href = attiva.link;
    });
  }

  // ── NAVIGATION ──
  document.querySelectorAll('.sectionBtn, .accentBtn').forEach(btn => {
    btn.addEventListener('click', () => {
      const href = btn.dataset.href;
      if (href) window.location.href = href;
    });
  });

  // ── SEARCH ──
  const searchBtn   = document.getElementById('searchBtn');
  const searchWrap  = document.getElementById('searchWrap');
  const searchInput = document.getElementById('searchInput');

  searchBtn.addEventListener('click', () => {
    const isOpen = searchWrap.classList.toggle('open');
    searchBtn.textContent = isOpen ? '❌' : '🔍';
    if (isOpen) setTimeout(() => searchInput.focus(), 200);
    if (!isOpen) { searchInput.value = ''; filterButtons(''); }
  });

  const allBtns  = document.querySelectorAll('.sectionBtn');
  const emptyMsg = document.getElementById('emptyMsg');

  function filterButtons(q) {
    let visible = 0;
    allBtns.forEach(btn => {
      const text = (btn.dataset.name + ' ' + btn.innerText).toLowerCase();
      const show = text.includes(q);
      btn.style.display = show ? '' : 'none';
      if (show) visible++;
    });
    emptyMsg.style.display = visible === 0 ? 'block' : 'none';
  }

  searchInput.addEventListener('input', () => {
    filterButtons(searchInput.value.toLowerCase().trim());
  });

const tips = [
    "Un approccio di vendita Omnicanale ci permette di unire i vantaggi del commercio fisico e digitale, come vendere il nostro catalogo online anche quando non è presente fisicamente in negozio.",
    "Un cliente soddisfatto parla bene di noi a 0 persone, un cliente entusiasta parla bene di noi a 3 persone, un cliente deluso parla male di noi a 7 persone.",
    "Applicare la presentazione WOW con il cliente aiuta a rompere il ghiaccio e conquistare la fiducia dei clienti, aumentando notevolmente le possibilità di concludere una migliore vendita.",
    "Quando interagisci con un cliente ricordati di ascoltare circa il doppio di quanto parli.",
    "Il principio cardine della vendita creativa è indagare i bisogni palesi inespressi ed i bisogni latenti dei clienti tramite un efficace mix di domande aperte e chiuse.",
    "Ricorda di applicare l'approccio T.A.S.K. : Trust, Ask, Solution, Klose.",
    "Utilizza al meglio tutti i canali comunicativi ricordando che quello che dici (Verbale) impatta l'efficacia della tua comunicazione SOLO per il 7%. Il restante 93% dipende da quello che non dici (Paraverbale e Non Verbale).",
    "Usa domande aperte per carpire più informazioni possibili dal cliente e domande chiuse per guidare la comunicazione, ottenere conferme e chiudere la vendita.",
    "Proponi la vendita complementare prima di concludere la vendita ma solo dopo aver individuato e validato il prodotto principale.",
    "Spesso le obiezioni sono il segnale di acquisto più forte. Impegniamoci a sfruttarle a nostro vantaggio per condurre una vendita efficace.",
    "Non diciamo mai di NO al cliente e sfruttiamo le potenzialità della vendita omnicanale con l'ausilio di tutti gli strumenti a nostra disposizione: Kiosk, Moby, Palette RFID, ecc)",
    "Il 40% della clientela che lascia il negozio senza comprare sarebbe potuta essere soddisfatta dall'Ordine Digitale In Store. La CA persa è stimata a circa il 10% della CA instore (esempio su Fiumicino circa 2 mln€).",
    "Lo sai che dal sito si possono fare carte regalo da 5€ fino a 500€?",
    "Lo sai che se un articolo è disponibile in qualsiasi negozio Romano il cliente può averlo entro il giorno dopo nel negozio che preferisce?",
    "Lo sai che se un cliente possessore di carta Decathlon Club associa le tessere Decathlon dei suoi soci alla sua guadagna punti sugli acquisti dei suoi soci?",
    "Lo sai che esista un'assicurazione generica valida per qualsiasi prodotto Decathlon eccetto tessile, calzature e i prodotti con assicurazioni dedicate (biciclette e macchinari fitness)?",
];

  document.getElementById('tipText').textContent = tips[Math.floor(Math.random() * tips.length)];
</script>
</body>
</html>
